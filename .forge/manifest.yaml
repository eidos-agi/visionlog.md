manifest_version: 1

repo:
  visibility: public
  org: eidos-agi
  topics: [mcp, vision, governance, guardrails, agent-tools]

packaging:
  build_system: hatchling
  pypi:
    name: visionlog
    publish: true
    trusted_publisher:
      owner: eidos-agi
      repo: visionlog.md
      workflow: publish.yml
      environment: pypi
  readme:
    absolute_images: true

quality:
  required_files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - CONTRIBUTING.md
    - SECURITY.md
  min_grade:
    foss_check: B
    ship_check: pass
    sec_audit: clean

dependencies:
  max_count: 3

ci:
  workflows:
    ci: true
    publish: true
  permissions:
    contents_read: true
  pre_commit: true
